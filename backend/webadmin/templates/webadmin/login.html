{% load static %}
<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Connexion — SMS</title>
  <link rel="icon" href="{% static 'webadmin/img/favicon.ico' %}" sizes="any">
  <link rel="icon" type="image/png" sizes="32x32" href="{% static 'webadmin/img/favicon-32x32.png' %}">
  <link rel="apple-touch-icon" href="{% static 'webadmin/img/apple-touch-icon.png' %}">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="{% static 'webadmin/css/app.css' %}" rel="stylesheet">
</head>
<body class="cobra-login-page">
  <div class="cobra-login-card shadow-lg p-4 p-md-5">
    <div class="text-center mb-4">
      <img src="{% static 'webadmin/img/sms-logo.png' %}" alt="SMS — Sécurité Multi Services" class="cobra-login-logo mx-auto d-block" width="260" height="78" decoding="async">
      <p class="text-secondary mb-0 mt-3">Connexion à l'espace d'administration</p>
    </div>
    {% if messages %}
      {% for message in messages %}
        <div class="alert alert-{% if message.tags == 'error' %}danger{% elif message.tags == 'success' %}success{% else %}info{% endif %} py-2 small">{{ message }}</div>
      {% endfor %}
    {% endif %}
    <form method="post" action="">
      {% csrf_token %}
      <div class="mb-3">
        <label class="form-label text-secondary small">Identifiant</label>
        <input type="text" name="username" class="form-control form-control-lg" required autocomplete="username" placeholder="Votre identifiant">
      </div>
      <div class="mb-4">
        <label class="form-label text-secondary small">Mot de passe</label>
        <input type="password" name="password" class="form-control form-control-lg" required autocomplete="current-password" placeholder="Votre mot de passe">
      </div>
      <button type="submit" class="btn cobra-btn-accent w-100 btn-lg">Se connecter</button>
    </form>
    <p class="text-center text-secondary small mt-4 mb-0">Accès réservé aux administrateurs et superviseurs.</p>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
