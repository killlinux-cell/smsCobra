{% extends "webadmin/base.html" %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-lg-8">
    <div class="card cobra-panel">
      <div class="card-header d-flex justify-content-between align-items-center">
        <span>Modifier le site</span>
        <a href="{% url 'webadmin-sites' %}" class="btn btn-sm btn-outline-secondary">Retour</a>
      </div>
      <div class="card-body">
        <form method="post" novalidate>
          {% csrf_token %}
          {% for field in form %}
            <div class="mb-3">
              <label class="form-label" for="{{ field.id_for_label }}">{{ field.label }}</label>
              {{ field }}
              {% if field.errors %}<div class="text-danger small">{{ field.errors }}</div>{% endif %}
            </div>
          {% endfor %}
          <button type="submit" class="btn cobra-btn-accent">Enregistrer les modifications</button>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
