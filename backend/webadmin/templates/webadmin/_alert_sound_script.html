{% load static %}
<script>
(() => {
  const key = "cobra_alert_sound_enabled";
  const toggleBtn = document.getElementById("alert-sound-toggle");
  const pollUrl = "{% url 'webadmin-critical-alerts-status' %}";
  let criticalCount = {{ critical_count|default:0 }};

  const alertSoundUrl = "{% static 'webadmin/audio/alert-sound.mp3' %}";
  let alertAudio = null;

  function updateButton(enabled) {
    if (!toggleBtn) return;
    toggleBtn.dataset.alertSoundEnabled = enabled ? "1" : "0";
    toggleBtn.setAttribute("aria-pressed", enabled ? "true" : "false");
    toggleBtn.innerHTML = enabled
      ? '<i class="bi bi-volume-up-fill me-1"></i>Son activé'
      : '<i class="bi bi-volume-mute-fill me-1"></i>Son coupé';
  }

  function playAlertSound() {
    if (criticalCount <= 0) return;
    try {
      if (!alertAudio) {
        alertAudio = new Audio(alertSoundUrl);
        alertAudio.preload = "auto";
        alertAudio.volume = 1;
      }
      alertAudio.currentTime = 0;
      const p = alertAudio.play();
      if (p && typeof p.catch === "function") {
        p.catch(() => {});
      }
    } catch (_) {}
  }

  function soundEnabled() {
    return localStorage.getItem(key) !== "0";
  }

  async function refreshCriticalCount() {
    try {
      const resp = await fetch(pollUrl, {
        credentials: "same-origin",
        headers: { Accept: "application/json" },
      });
      if (!resp.ok) return;
      const data = await resp.json();
      if (typeof data.critical_count === "number") {
        criticalCount = data.critical_count;
      }
    } catch (_) {}
  }

  if (toggleBtn) {
    updateButton(soundEnabled());
    toggleBtn.addEventListener("click", () => {
      const enabled = !soundEnabled();
      localStorage.setItem(key, enabled ? "1" : "0");
      updateButton(enabled);
      if (enabled) playAlertSound();
    });
  }

  if (soundEnabled()) {
    if (criticalCount > 0) {
      setTimeout(() => {
        if (!document.hidden) playAlertSound();
      }, 250);
    }
    setInterval(async () => {
      if (document.hidden || !soundEnabled()) return;
      await refreshCriticalCount();
      playAlertSound();
    }, 45000);
  }
})();
</script>
